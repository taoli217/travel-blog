server:
  port: 8080

spring:
  application:
    name: travel-blog
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:travelblog;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.travelblog.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# 初始化SQL
sql:
  init:
    mode: always
    schema-locations: classpath:schema.sql
    data-locations: classpath:data.sql

jwt:
  secret: travel-blog-secret-key-2024-very-long-secret-key-for-jwt-token
  expiration: 86400000
